<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Packlisten Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <style>
        /* --- GRUND-LAYOUT --- */
        body { background-color: #525659; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* --- BEDIENFELD --- */
        .control-panel { background-color: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); width: 297mm; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; border-top: 5px solid #0066cc; }
        .form-section { background: white; padding: 15px; border-radius: 6px; border: 1px solid #ddd; }
        .form-section h3 { margin-top: 0; margin-bottom: 15px; color: #333; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .box-main { border-left: 5px solid #0066cc; background-color: #f4f9ff; }
        .box-inner { border-left: 5px solid #28a745; background-color: #f4fff7; }
        .box-logger { border-left: 5px solid #cc0000; background-color: #fff4f4; }
        .input-row { display: flex; gap: 15px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .control-panel label { font-size: 11px; font-weight: bold; color: #555; }
        .control-panel input, .control-panel textarea { padding: 6px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; font-family: Arial, sans-serif; }
        .btn-main, .btn-inner, .btn-logger { color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: auto;}
        .btn-main { background: #0066cc; } .btn-inner { background: #28a745; } .btn-logger { background: #cc0000; }
        .btn-pdf { background: #333; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* --- DAS ECHTE A4 BLATT --- */
        .a4-page {
            background-color: white; 
            width: 297mm; 
            height: 210mm; 
            padding: 12mm 15mm 15mm 15mm; 
            box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            position: relative; color: #000; overflow: hidden; margin-bottom: 20px;
        }

        .vertical-text { position: absolute; left: 6mm; bottom: 35mm; writing-mode: vertical-rl; transform: rotate(180deg); font-size: 7.5pt; color: #888; letter-spacing: 0.5px; }

        /* --- KOPFZEILE --- */
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6mm; margin-top: 2mm;}
        .title-block { width: 45%; }
        .title-block h1 { font-size: 12pt; margin: 0 0 2mm 0; font-weight: normal; white-space: nowrap; letter-spacing: -0.2px; } 
        .barcode-block { width: 35%; text-align: left; padding-left: 5mm; margin-top: -1mm;}
        .logo-block { width: 20%; text-align: right; margin-top: -2mm; }
        .logo-block img { height: 12mm; width: auto; float: right; object-fit: contain; }

        /* --- ADRESSEN (Perfekt positioniert nach Original-Maßen!) --- */
        .address-container { display: flex; width: 100%; margin-bottom: 3mm; line-height: 1.2; font-size: 8pt; }
        .address-box-inv { width: 32.1%; box-sizing: border-box; } 
        .address-gap { width: 26.8%; } /* Dieser Abstand schiebt den Consignee exakt an die richtige Stelle */
        .address-box-cons { width: 32.8%; box-sizing: border-box; }
        .address-title { font-weight: bold; margin-bottom: 2mm; font-size: 8.5pt; }
        .address-grid { display: grid; grid-template-columns: 14mm auto; margin-top: 2mm; }

        /* --- TABELLEN-DESIGN (Keine vertikalen Gitter mehr!) --- */
        .datum { margin-bottom: 3mm; font-weight: normal; font-size: 8pt;} /* Datum ist jetzt NICHT mehr dick gedruckt */
        .section-title { font-size: 8pt; margin-bottom: 1mm; font-weight: normal;}
        
        .data-table { width: 100%; border-collapse: collapse; margin-bottom: 5mm; font-size: 7.5pt; table-layout: fixed; }
        
        /* Absolut keine vertikalen Rahmenlinien für alle Zellen! */
        .data-table th, .data-table td { 
            border: none; 
            padding: 2px 3px; 
            text-align: left; 
            vertical-align: top; 
            line-height: 1.15; 
            overflow-wrap: break-word; 
            word-wrap: break-word; 
        }
        
        /* Nur die Kopfzeilen bekommen einen Strich oben und unten */
        .data-table thead th { 
            border-top: 1.5px solid #000; 
            border-bottom: 1.5px solid #000; 
            font-weight: bold; 
        }

        /* EXAKTE PROZENTWERTE FÜR SPALTEN */
        .col-1 { width: 13.2%; } .col-2 { width: 12.1%; } .col-3 { width: 12.0%; }
        .col-4 { width: 12.8%; } .col-5 { width: 9.9%; }  .col-6 { width: 11.9%; }
        .col-7 { width: 13.4%; } .col-8 { width: 8.1%; }  .col-9 { width: 6.6%; }

        /* --- TRENNLINIEN FÜR PACKSTÜCKE --- */
        .main-row td { border-bottom: 1px solid #000; } /* Trennt Hauptpakete voneinander */
        .sub-header th { background-color: #f9f9f9; border-top: 1.5px solid #000; border-bottom: 1.5px solid #000; }
        .inner-row-1 td { border-bottom: 1px solid #000; } /* Trennt Karton-Zeile von Medicament-Zeile */
        .inner-row-2 td { border-bottom: 1px solid #000; padding-bottom: 6px; } /* Schließt das Unterpaket ab */

        .footer-fixed { position: absolute; bottom: 12mm; left: 15mm; right: 15mm; display: flex; justify-content: space-between; font-size: 7.5pt; line-height: 1.2; }

        @media print {
            body { background-color: white; padding: 0; }
            .control-panel { display: none !important; } 
            .a4-page { box-shadow: none; margin-bottom: 0; page-break-after: always; }
            @page { size: A4 landscape; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="control-panel">

        <div class="form-section">
            <h3>1. Basis-Daten</h3>
            <div class="input-row">
                <div class="input-group"><label>Frachteinheit:</label><input type="text" id="in-fracht" value="" placeholder="z.B. 4100167438" oninput="updateLive()" style="width: 150px; font-weight: bold;"></div>
                <div class="input-group"><label>Datum:</label><input type="text" id="in-datum" value="" placeholder="z.B. 19.02.2026" oninput="updateLive()" style="width: 90px;"></div>
                <div class="input-group"><label>E2E Order:</label><input type="text" id="in-e2e" value="" placeholder="z.B. 2101352626" oninput="updateLive()" style="width: 100px;"></div>
                
                <div class="input-group">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #0066cc;">
                        <input type="checkbox" id="chk-clara" onchange="toggleClara()" style="margin: 0;"> Clara Document
                    </label>
                    <input type="text" id="in-clara" value="" placeholder="z.B. 9681683266" style="width: 100px; display: none;" oninput="updateLive()">
                </div>
            </div>
            
            <div class="input-row" style="margin-top: 10px;">
                <div class="input-group" style="width: 45%;">
                    <label>Invoice recipient:</label>
                    <textarea id="in-inv-adresse" rows="3" oninput="updateLive()" placeholder="Firma...&#10;Straße...&#10;Stadt..."></textarea>
                    <div style="display: flex; gap: 5px; margin-top: 5px;">
                        <input type="text" id="in-inv-kontakt" value="" oninput="updateLive()" placeholder="Kontaktperson" style="width: 33%;">
                        <input type="text" id="in-inv-tel" value="" oninput="updateLive()" placeholder="Telefon" style="width: 33%;">
                        <input type="text" id="in-inv-mail" value="" oninput="updateLive()" placeholder="E-Mail" style="width: 33%;">
                    </div>
                </div>
                <div class="input-group" style="width: 45%;">
                    <label>Consignee:</label>
                    <textarea id="in-cons-adresse" rows="3" oninput="updateLive()" placeholder="Firma...&#10;Straße...&#10;Stadt..."></textarea>
                    <div style="display: flex; gap: 5px; margin-top: 5px;">
                        <input type="text" id="in-cons-kontakt" value="" oninput="updateLive()" placeholder="Kontaktperson" style="width: 33%;">
                        <input type="text" id="in-cons-tel" value="" oninput="updateLive()" placeholder="Telefon" style="width: 33%;">
                        <input type="text" id="in-cons-mail" value="" oninput="updateLive()" placeholder="E-Mail" style="width: 33%;">
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section box-main">
            <h3 style="color: #0066cc;">📦 2a. HAUPTVERPACKUNG</h3>
            <div class="input-row">
                <div class="input-group"><label>Package ID (SSCC):</label><input type="text" id="main-id" value="" placeholder="z.B. 37640135..." style="width: 150px;"></div>
                <div class="input-group"><label>Typ:</label><input type="text" id="main-typ" value="" placeholder="Cold chain container..." style="width: 160px;"></div>
                <div class="input-group"><label>Dimensionen:</label><input type="text" id="main-dim" value="" placeholder="120x100x140 cm" style="width: 110px;"></div>
                <div class="input-group"><label>Temperatur:</label><input type="text" id="main-temp" value="" placeholder="store between +2°C..." style="width: 180px;"></div>
                <div class="input-group"><label>Net weight:</label><input type="text" id="main-net" value="" placeholder="z.B. 24.264" style="width: 60px;"></div>
                <div class="input-group"><label>Gross weight:</label><input type="text" id="main-gross" value="" placeholder="z.B. 281.290" style="width: 60px;"></div>
                <button class="btn-main" onclick="addMain()">+ Speichern</button>
            </div>
        </div>

        <div class="form-section box-inner">
            <h3 style="color: #28a745;">↳ 2b. UNTERVERPACKUNG (Karton)</h3>
            <div class="input-row" style="align-items: stretch;">
                <div style="display: flex; flex-direction: column; gap: 10px; width: 160px;">
                    <div class="input-group"><label>Inner-Package ID:</label><input type="text" id="inner-id" value="" placeholder="z.B. 2123456..."></div>
                    <div class="input-group"><label>Typ:</label><input type="text" id="inner-typ" value="" placeholder="Karton"></div>
                    <div class="input-group"><label>Dimensionen:</label><input type="text" id="inner-dim" value="" placeholder="0x0x0 cm"></div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px; width: 300px;">
                    <div class="input-group" style="height: 100%;">
                        <label>Wareninhalt (Mehrzeilig):</label>
                        <textarea id="inner-inhalt" placeholder="Medicament&#10;Batch: ..." style="height: 100%; min-height: 90px; font-family: monospace;"></textarea>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px; width: 120px; justify-content: flex-end;">
                    <div class="input-group"><label>Dangerous goods:</label><input type="text" id="inner-gefahr" value="" placeholder="-"></div>
                    <div class="input-group"><label>HS-Code:</label><input type="text" id="inner-hs" value="" placeholder="3004.39"></div>
                    <div class="input-group"><label>Menge:</label><input type="text" id="inner-qty" value="" placeholder="60.00 ea"></div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 10px; width: 120px; justify-content: flex-end;">
                    <div class="input-group"><label>Net weight:</label><input type="text" id="inner-net" value="" placeholder="z.B. 4.044"></div>
                    <div class="input-group"><label>Gross weight:</label><input type="text" id="inner-gross" value="" placeholder="z.B. 4.875"></div>
                    <button class="btn-inner" onclick="addInner()">+ Karton</button>
                </div>
            </div>
        </div>

        <div class="form-section box-logger">
            <h3 style="color: #cc0000;">🌡️ 3. TEMPERATUR-LOGGER</h3>
            <div class="input-row">
                <div class="input-group"><label>Package ID:</label><input type="text" id="log-pid" value="" placeholder="z.B. 37640135..." style="width: 150px;"></div>
                <div class="input-group"><label>Laufende Nr.:</label><input type="text" id="log-nr" value="" placeholder="1." style="width: 40px;"></div>
                <div class="input-group"><label>Device S/N:</label><input type="text" id="log-sn" value="" placeholder="72071008363" style="width: 120px;"></div>
                <div class="input-group"><label>Zusatz-Info:</label><input type="text" id="log-info" value="" placeholder="mid. of box..." style="width: 160px;"></div>
                <button class="btn-logger" onclick="addLogger()">+ Logger</button>
            </div>
        </div>

        <button class="btn-pdf" onclick="window.print()">📄 Packliste fertigstellen & als PDF drucken</button>
    </div>

    <div id="pdf-output-container"></div>

    <script>
        let mainPackages = [];
        let loggerData = [];

        function toggleClara() {
            let chk = document.getElementById("chk-clara").checked;
            document.getElementById("in-clara").style.display = chk ? "block" : "none";
            renderDocument();
        }

        function safeHtml(text) { return text ? text.replace(/\n/g, "<br>") : ""; }
        function berechneVolumen(dimString) { let match = dimString.match(/(\d+)\s*x\s*(\d+)\s*x\s*(\d+)/i); if(match) { return (parseFloat(match[1]) * parseFloat(match[2]) * parseFloat(match[3])) / 1000000; } return 0; }
        function formatWeight(w) { w = w.trim(); if(w === "") return ""; if(!w.toLowerCase().includes("kg")) return w + " kg"; return w; }

        function buildEmptyPage(pageNum, isFirstPage) {
            let addressHtml = ""; let totalsHtml = "";
            if(isFirstPage) {
                addressHtml = `
                <div class="address-container">
                    <div class="address-box-inv">
                        <div class="address-title">Invoice recipient</div>
                        <span class="out-inv-adresse" style="white-space: pre-line;"></span>
                        <div class="address-grid"><div>Contact:</div><div class="out-inv-kontakt"></div><div>Phone:</div><div class="out-inv-tel"></div><div>E-Mail:</div><div class="out-inv-mail"></div></div>
                    </div>
                    <div class="address-gap"></div>
                    <div class="address-box-cons">
                        <div class="address-title">Consignee</div>
                        <span class="out-cons-adresse" style="white-space: pre-line;"></span>
                        <div class="address-grid"><div>Contact:</div><div class="out-cons-kontakt"></div><div>Phone:</div><div class="out-cons-tel"></div><div>E-Mail:</div><div class="out-cons-mail"></div></div>
                    </div>
                </div>
                <div class="datum">Date: <span class="out-datum"></span></div>
                `;
                totalsHtml = `
                <div class="section-title">Total packing-list:</div>
                <table class="data-table totals-table" style="margin-bottom: 5mm;">
                    <thead><tr><th style="width: 22%">Shipping marks</th><th style="width: 22%">UCR No. (GSIN)</th><th style="width: 10%">Total no. of<br>packages</th><th style="width: 12%">Total gross weight</th><th style="width: 12%">Total net weight</th><th style="width: 10%">Total volume</th><th style="width: 12%">Total no. of temperature<br>monitoring devices *</th></tr></thead>
                    <tbody><tr><td>Address of consignee,<br><span class="out-fracht-table"></span></td><td>(402) 7640135 790167438 4</td><td class="out-total-packages">0</td><td class="out-total-gross">0.000 kg</td><td class="out-total-net">0.000 kg</td><td class="out-total-vol">0.00 m3</td><td class="out-total-logger">0</td></tr></tbody>
                </table>
                `;
            }
            return `
            <div class="a4-page" id="page-${pageNum}">
                <div class="vertical-text">7840135792109TEC0165147V4</div>
                <div class="header">
                    <div class="title-block">
                        <h1>Packing List to Freight Unit <span class="out-fracht"></span></h1>
                        <span style="font-size: 8.5pt;">(Version Black Week)</span>
                    </div>
                    <div class="barcode-block"><svg class="barcode-svg"></svg></div>
                    <div class="logo-block"><img src="roche-logo.png" alt="Roche Logo"></div>
                </div>
                ${addressHtml} ${totalsHtml}
                <div class="section-title">Detail packing-list:</div>
                <table class="data-table">
                    <thead><tr><th class="col-1">Package ID (SSCC)</th><th class="col-2">Packing type</th><th class="col-3">Dimensions<br>(LxHxW cm)</th><th class="col-4">Content</th><th class="col-5">Temperature<br>conditions</th><th class="col-6">Temperature<br>monitoring devices *</th><th class="col-7">Dangerous<br>goods</th><th class="col-8">Net weight</th><th class="col-9">Gross weight</th></tr></thead>
                    <tbody class="details-body"></tbody>
                </table>
                <div class="bottom-info-container"></div>
                <div class="footer-fixed">
                    <div><b>F. Hoffmann-La Roche Ltd</b><br>Site Logistics<br>Grenzacherstrasse 124<br>4070 Basel / Switzerland</div>
                    <div style="margin-left: -50px;">Bldg. 041 / 3.005</div>
                    <div>Tel. +41 61 688 72 27<br>Fax. +41 61 688 69 02<br>E-Mail: basel.site-logistics@roche.com</div>
                    <div style="text-align: right; margin-top: auto;" class="page-number">Page ${pageNum} / {TOTAL_PAGES}</div>
                </div>
            </div>`;
        }

        function renderDocument() {
            const container = document.getElementById("pdf-output-container");
            container.innerHTML = ""; 
            let pageNum = 1; container.insertAdjacentHTML('beforeend', buildEmptyPage(pageNum, true));
            let currentPage = document.getElementById(`page-${pageNum}`); let currentTbody = currentPage.querySelector(".details-body");
            let sumNet = 0, sumGross = 0, sumVol = 0, mainCount = 0;

            function addNodesSafe(htmlArray) {
                htmlArray.forEach(html => currentTbody.insertAdjacentHTML('beforeend', html));
                if (currentPage.scrollHeight > currentPage.clientHeight + 2) {
                    for(let i=0; i<htmlArray.length; i++) { currentTbody.lastElementChild.remove(); }
                    pageNum++; container.insertAdjacentHTML('beforeend', buildEmptyPage(pageNum, false));
                    currentPage = document.getElementById(`page-${pageNum}`); currentTbody = currentPage.querySelector(".details-body");
                    htmlArray.forEach(html => currentTbody.insertAdjacentHTML('beforeend', html));
                }
            }

            mainPackages.forEach(main => {
                mainCount++; sumNet += parseFloat(main.net) || 0; sumGross += parseFloat(main.gross) || 0; sumVol += berechneVolumen(main.dim);
                let contentString = ""; if(main.inners.length > 0) { contentString = `${main.inners.length} Inner-Packages<br>` + main.inners.map(inner => inner.id).join('<br>'); }
                let loggerString = loggerData.filter(log => log.pid === main.id).map(log => `<b>${log.nr} ${log.sn}</b><br><span style="font-size:6.5pt">${safeHtml(log.info)}</span>`).join('<br>');

                addNodesSafe([`<tr class="main-row"><td class="col-1">${main.id}</td><td class="col-2">${main.typ}</td><td class="col-3">${main.dim}</td><td class="col-4">${contentString}</td><td class="col-5">${main.temp}</td><td class="col-6">${loggerString}</td><td class="col-7"></td><td class="col-8">${main.net}</td><td class="col-9">${main.gross}</td></tr>`]);

                if(main.inners.length > 0) {
                    addNodesSafe([`<tr class="sub-header"><th>Inner-Package ID</th><th>Packing type</th><th>Dimensions<br>(LxHxW cm)</th><th>Content</th><th>Temperature<br>conditions</th><th>Temperature<br>monitoring devices</th><th>Dangerous<br>goods</th><th>Net weight</th><th>Gross weight</th></tr>`]);
                    main.inners.forEach(inner => {
                        let inhaltArray = inner.inhalt.split('\n'); let inhaltErsteZeile = inhaltArray[0] || ""; let inhaltRest = [...inhaltArray]; inhaltRest.shift(); 
                        
                        let row1 = `<tr class="inner-row-1"><td>${inner.id}</td><td>${inner.typ}</td><td>${inner.dim}</td><td>${inhaltErsteZeile}</td><td>${main.temp}</td><td>-</td><td>${inner.gefahr}</td><td>${inner.net}</td><td>${inner.gross}</td></tr>`;
                        let row2 = `<tr class="inner-row-2"><td colspan="9"><div style="display: flex; justify-content: space-between;"><div style="width: 45%;">${inhaltRest.join('<br>')}</div><div style="width: 25%;"><table style="border:none; margin:0; font-size: 7pt; width: 100%;"><tr><td style="border:none; padding:0; width:50%;">HS-Code:</td><td style="border:none; padding:0;">${inner.hsCode}</td></tr><tr><td style="border:none; padding:0;">Country of origin:</td><td style="border:none; padding:0;">IT</td></tr><tr><td style="border:none; padding:0;">Preferential origin:</td><td style="border:none; padding:0;">None</td></tr></table></div><div style="width: 15%;">Quantity<br>${inner.qty}</div><div style="width: 15%;">Net weight<br>${inner.net}</div></div></td></tr>`;
                        
                        addNodesSafe([row1, row2]);
                    });
                }
            });

            let includeClara = document.getElementById("chk-clara").checked;
            let claraTh = includeClara ? `<th>Clara Document</th>` : "";
            let claraTd = includeClara ? `<td class="out-clara"></td>` : "";
            let refTableWidth = includeClara ? "70mm" : "35mm";

            let loggerRows = loggerData.map(log => `<tr><td>${log.pid}</td><td>${log.sn}</td><td>Elpro Libero CB</td><td>Elpro Buchs AG, CH-Buchs</td><td>CH</td><td>9025.19</td><td style="border-right:none; width:10mm;">CHF</td><td style="border-left:none; text-align:right;">18.50</td></tr>`).join('');
            let bottomHtml = `
                <div style="font-size: 7.5pt; margin-bottom: 1mm; margin-top: 5mm;">* Details to Temperature Monitoring devices:</div>
                <table class="data-table" style="width: 60%; margin-bottom: 4mm;">
                    <thead><tr><th style="width: 25%;">Package ID</th><th style="width: 15%;">Device S/N</th><th style="width: 15%;">Type</th><th style="width: 20%;">Manufacturer</th><th style="width: 10%;">Origin</th><th style="width: 10%;">HS-Code</th><th colspan="2" style="width: 5%;">Value</th></tr></thead>
                    <tbody>${loggerRows}</tbody>
                </table>
                <div style="font-size: 7.5pt; margin-bottom: 1mm;">* Details to Document References</div>
                <table class="data-table" style="width: ${refTableWidth}; margin-bottom: 4mm;">
                    <thead><tr><th>E2E Order</th>${claraTh}</tr></thead>
                    <tbody class="main-row"><tr><td class="out-e2e"></td>${claraTd}</tr></tbody>
                </table>
            `;

            let bottomContainer = currentPage.querySelector(".bottom-info-container");
            bottomContainer.innerHTML = bottomHtml;

            if (currentPage.scrollHeight > currentPage.clientHeight + 2) {
                bottomContainer.innerHTML = ""; pageNum++;
                container.insertAdjacentHTML('beforeend', buildEmptyPage(pageNum, false));
                currentPage = document.getElementById(`page-${pageNum}`);
                currentPage.querySelector(".bottom-info-container").innerHTML = bottomHtml;
            }

            updateStaticTexts(pageNum, mainCount, sumGross, sumNet, sumVol);
        }

        function updateStaticTexts(totalPages, mainCount, sumGross, sumNet, sumVol) {
            const fracht = document.getElementById("in-fracht").value;
            const classesToUpdate = ["inv-adresse", "inv-kontakt", "inv-tel", "inv-mail", "cons-adresse", "cons-kontakt", "cons-tel", "cons-mail", "e2e"];
            if (document.getElementById("chk-clara").checked) { classesToUpdate.push("clara"); }
            
            for (let i = 1; i <= totalPages; i++) {
                let page = document.getElementById(`page-${i}`);
                page.innerHTML = page.innerHTML.replace(/{TOTAL_PAGES}/g, totalPages);
                page.querySelectorAll(".out-fracht").forEach(el => el.innerText = fracht);
                
                let barcodeSvg = page.querySelector(".barcode-svg");
                if (fracht.trim() !== "") {
                    barcodeSvg.style.display = "inline-block";
                    JsBarcode(barcodeSvg, fracht, { format: "CODE128", lineColor: "#000", width: 1.4, height: 28, displayValue: false, margin: 0 });
                } else {
                    barcodeSvg.style.display = "none";
                }
                
                classesToUpdate.forEach(cls => { let val = document.getElementById(`in-${cls}`).value; page.querySelectorAll(`.out-${cls}`).forEach(el => el.innerText = val); });
                page.querySelectorAll(".out-datum").forEach(el => el.innerText = document.getElementById("in-datum").value);
                if(i === 1) {
                    page.querySelector(".out-fracht-table").innerText = fracht;
                    page.querySelector(".out-total-packages").innerText = mainCount;
                    page.querySelector(".out-total-gross").innerText = sumGross > 0 ? sumGross.toFixed(3) + " kg" : "0.000 kg";
                    page.querySelector(".out-total-net").innerText = sumNet > 0 ? sumNet.toFixed(3) + " kg" : "0.000 kg";
                    page.querySelector(".out-total-vol").innerText = sumVol > 0 ? sumVol.toFixed(2) + " m3" : "0.00 m3";
                    page.querySelector(".out-total-logger").innerText = loggerData.length;
                }
            }
        }

        function addMain() {
            let id = document.getElementById("main-id").value;
            if(id === "") { alert("Bitte eine Package ID eingeben!"); return; }
            mainPackages.push({ id: id, typ: document.getElementById("main-typ").value, dim: document.getElementById("main-dim").value, temp: document.getElementById("main-temp").value, net: formatWeight(document.getElementById("main-net").value), gross: formatWeight(document.getElementById("main-gross").value), inners: [] });
            renderDocument(); document.getElementById("main-id").value = ""; 
        }
        function addInner() {
            if(mainPackages.length === 0) { alert("Bitte lege zuerst eine Hauptverpackung an!"); return; }
            let id = document.getElementById("inner-id").value;
            if(id === "") { alert("Bitte eine Inner-Package ID eingeben!"); return; }
            mainPackages[mainPackages.length - 1].inners.push({ id: id, typ: document.getElementById("inner-typ").value, dim: document.getElementById("inner-dim").value, inhalt: document.getElementById("inner-inhalt").value, gefahr: document.getElementById("inner-gefahr").value, hsCode: document.getElementById("inner-hs").value, qty: document.getElementById("inner-qty").value, net: formatWeight(document.getElementById("inner-net").value), gross: formatWeight(document.getElementById("inner-gross").value) });
            renderDocument(); document.getElementById("inner-id").value = ""; 
        }
        function addLogger() {
            let pid = document.getElementById("log-pid").value;
            let sn = document.getElementById("log-sn").value;
            if(pid === "" || sn === "") { alert("Bitte Package ID und Device S/N eingeben!"); return; }
            loggerData.push({ pid: pid, nr: document.getElementById("log-nr").value, sn: sn, info: document.getElementById("log-info").value });
            renderDocument(); document.getElementById("log-sn").value = ""; document.getElementById("log-info").value = "";
        }

        function updateLive() { renderDocument(); }
        renderDocument();
    </script>
</body>
</html>
