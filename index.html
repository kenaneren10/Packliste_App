<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Packlisten Generator - Pharmalogistik</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
    <style>
        /* --- GRUND-LAYOUT --- */
        body { background-color: #525659; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* --- BEDIENFELD (Nicht im Druck) --- */
        .control-panel { background-color: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); width: 297mm; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; border-top: 5px solid #0066cc; }
        .form-section { background: white; padding: 15px; border-radius: 6px; border: 1px solid #ddd; }
        .form-section h3 { margin-top: 0; margin-bottom: 15px; color: #333; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .box-main { border-left: 5px solid #0066cc; background-color: #f4f9ff; }
        .box-inner { border-left: 5px solid #28a745; background-color: #f4fff7; }
        .box-logger { border-left: 5px solid #cc0000; background-color: #fff4f4; }
        .input-row { display: flex; gap: 15px; align-items: flex-start; flex-wrap: wrap; margin-bottom: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .control-panel label { font-size: 11px; font-weight: bold; color: #555; }
        .control-panel input, .control-panel textarea { padding: 6px; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; font-family: Arial, sans-serif; }
        .btn-main, .btn-inner, .btn-logger { color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: auto;}
        .btn-main { background: #0066cc; } .btn-inner { background: #28a745; } .btn-logger { background: #cc0000; }
        .btn-pdf { background: #333; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* --- DAS ECHTE A4 BLATT (Millimetergenau) --- */
        .a4-page {
            background-color: white; 
            width: 297mm; 
            height: 210mm; 
            padding: 9mm 18mm 9mm 22mm; 
            box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
            position: relative; color: #000; overflow: hidden; margin-bottom: 20px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 8pt;
        }

        .vertical-text { position: absolute; left: 6mm; bottom: 35mm; writing-mode: vertical-rl; transform: rotate(180deg); font-size: 8pt; color: #888; letter-spacing: 0.5px; }

        /* --- KOPFZEILE --- */
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 11mm; margin-top: 2mm;}
        .title-block { width: 45%; }
        .title-block h1 { font-family: Arial, Helvetica, sans-serif; font-size: 14pt; margin: 0 0 2mm 0; line-height: 1; font-weight: normal; white-space: nowrap; letter-spacing: -0.2px; } 
        .barcode-block { width: 35%; text-align: left; padding-left: 5mm; margin-top: -1mm;}
        .logo-block { width: 20%; text-align: right; margin-top: -2mm; }
        .logo-block img { height: 12mm; width: auto; float: right; object-fit: contain; }

        /* --- ADRESSEN (Consignee @ 103mm) --- */
        .address-container { display: flex; width: 100%; margin-bottom: 10mm; line-height: 1.2; font-size: 8pt; }
        .address-box:first-child { width: 81mm; box-sizing: border-box; padding-right: 15mm; } 
        .address-box:last-child { flex: 1; box-sizing: border-box; } 
        .address-title { font-weight: bold; margin-bottom: 2mm; font-size: 8pt; }
        .address-grid { display: grid; grid-template-columns: 14mm auto; margin-top: 2mm; }

        /* --- TABELLEN-DESIGN --- */
        .datum { margin-bottom: 3mm; font-weight: normal; font-size: 8pt; line-height: 1;}
        .section-title { font-size: 8pt; margin-bottom: 1mm; font-weight: normal;}
        .data-table { width: 100%; border-collapse: collapse; margin-bottom: 5mm; font-size: 8pt; table-layout: fixed; }
        .data-table th, .data-table td { border: 1px solid #000; padding: 2px 3px; text-align: left; vertical-align: top; line-height: 1.15; overflow-wrap: break-word; }
        .data-table th { font-weight: bold; }

        /* EXAKTE PROZENTWERTE (Summe = 100% von 257mm) */
        .col-1 { width: 13.2%; } .col-2 { width: 12.1%; } .col-3 { width: 12.0%; }
        .col-4 { width: 12.8%; } .col-5 { width: 9.9%; }  .col-6 { width: 11.9%; }
        .col-7 { width: 13.4%; } .col-8 { width: 8.1%; }  .col-9 { width: 6.6%; }

        /* --- ARTIKEL-ZEILEN --- */
        .sub-header th { background-color: #f2f2f2; border-top: 1px solid #000; border-bottom: 1px solid #000; }
        .inner-row-1 td { border-bottom: none !important; }
        .inner-row-2 td { border-top: none !important; border-bottom: 1px solid #000 !important; padding-bottom: 6px; }

        /* --- FUSSZEILE --- */
        .footer-fixed { position: absolute; bottom: 12mm; left: 22mm; right: 18mm; display: flex; justify-content: space-between; font-size: 8pt; line-height: 1.2; }

        @media print {
            body { background-color: white; padding: 0; }
            .control-panel { display: none !important; } 
            .a4-page { box-shadow: none; margin-bottom: 0; page-break-after: always; }
            @page { size: A4 landscape; margin: 0; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="form-section">
            <h3>1. Basis-Daten</h3>
            <div class="input-row">
                <div class="input-group"><label>Frachteinheit:</label><input type="text" id="in-fracht" placeholder="z.B. 4100167438" oninput="updateLive()" style="width: 150px; font-weight: bold;"></div>
                <div class="input-group"><label>Datum:</label><input type="text" id="in-datum" placeholder="19.02.2026" oninput="updateLive()" style="width: 90px;"></div>
                <div class="input-group"><label>E2E Order:</label><input type="text" id="in-e2e" placeholder="2101352626" oninput="updateLive()" style="width: 100px;"></div>
                <div class="input-group">
                    <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #0066cc;">
                        <input type="checkbox" id="chk-clara" onchange="toggleClara()"> Clara Document
                    </label>
                    <input type="text" id="in-clara" placeholder="9681683266" style="width: 100px; display: none;" oninput="updateLive()">
                </div>
            </div>
            <div class="input-row">
                <div class="input-group" style="width: 48%;">
                    <label>Invoice recipient:</label>
                    <textarea id="in-inv-adresse" rows="3" oninput="updateLive()"></textarea>
                    <div style="display: flex; gap: 5px; margin-top: 5px;">
                        <input type="text" id="in-inv-kontakt" placeholder="Kontakt" oninput="updateLive()" style="width: 33%;">
                        <input type="text" id="in-inv-tel" placeholder="Tel" oninput="updateLive()" style="width: 33%;">
                        <input type="text" id="in-inv-mail" placeholder="Mail" oninput="updateLive()" style="width: 33%;">
                    </div>
                </div>
                <div class="input-group" style="width: 48%;">
                    <label>Consignee:</label>
                    <textarea id="in-cons-adresse" rows="3" oninput="updateLive()"></textarea>
                    <div style="display: flex; gap: 5px; margin-top: 5px;">
                        <input type="text" id="in-cons-kontakt" placeholder="Kontakt" oninput="updateLive()" style="width: 33%;">
                        <input type="text" id="in-cons-tel" placeholder="Tel" oninput="updateLive()" style="width: 33%;">
                        <input type="text" id="in-cons-mail" placeholder="Mail" oninput="updateLive()" style="width: 33%;">
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section box-main">
            <h3 style="color: #0066cc;">📦 2a. HAUPTVERPACKUNG</h3>
            <div class="input-row">
                <div class="input-group"><label>Package ID (SSCC):</label><input type="text" id="main-id" style="width: 150px;"></div>
                <div class="input-group"><label>Typ:</label><input type="text" id="main-typ" style="width: 150px;"></div>
                <div class="input-group"><label>Dimensionen:</label><input type="text" id="main-dim" placeholder="120x100x140 cm" style="width: 110px;"></div>
                <div class="input-group"><label>Temperatur:</label><input type="text" id="main-temp" value="store between +2°C to +8°C" style="width: 160px;"></div>
                <div class="input-group"><label>Netto (Box):</label><input type="text" id="main-net" style="width: 60px;"></div>
                <div class="input-group"><label>Brutto (Box):</label><input type="text" id="main-gross" style="width: 60px;"></div>
                <button class="btn-main" onclick="addMain()">+ Box anlegen</button>
            </div>
        </div>

        <div class="form-section box-inner">
            <h3 style="color: #28a745;">↳ 2b. ARTIKEL / INHALT (gehört zur letzten Box)</h3>
            <div class="input-row">
                <div class="input-group" style="width: 300px;">
                    <label>Bezeichnung & Charge:</label>
                    <textarea id="art-inhalt" rows="3" placeholder="Medicament name&#10;Batch: ..."></textarea>
                </div>
                <div class="input-group"><label>HS-Code:</label><input type="text" id="art-hs" value="3004.39" style="width: 80px;"></div>
                <div class="input-group"><label>Menge:</label><input type="text" id="art-qty" placeholder="100 ea" style="width: 70px;"></div>
                <div class="input-group"><label>Netto:</label><input type="text" id="art-net" style="width: 60px;"></div>
                <div class="input-group"><label>Brutto:</label><input type="text" id="art-gross" style="width: 60px;"></div>
                <div class="input-group"><label>Gefahr:</label><input type="text" id="art-gefahr" value="-" style="width: 50px;"></div>
                <button class="btn-inner" onclick="addArticle()">+ Artikel hinzufügen</button>
            </div>
        </div>

        <div class="form-section box-logger">
            <h3 style="color: #cc0000;">🌡️ 3. TEMPERATUR-LOGGER</h3>
            <div class="input-row">
                <div class="input-group"><label>Package ID:</label><input type="text" id="log-pid" style="width: 150px;"></div>
                <div class="input-group"><label>Nr.:</label><input type="text" id="log-nr" value="1." style="width: 30px;"></div>
                <div class="input-group"><label>S/N:</label><input type="text" id="log-sn" style="width: 120px;"></div>
                <div class="input-group"><label>Info:</label><input type="text" id="log-info" value="middle of box" style="width: 150px;"></div>
                <button class="btn-logger" onclick="addLogger()">+ Logger</button>
            </div>
        </div>

        <button class="btn-pdf" onclick="window.print()">📄 Packliste drucken</button>
    </div>

    <div id="pdf-output-container"></div>

    <script>
        let mainPackages = [];
        let loggerData = [];

        function toggleClara() {
            let chk = document.getElementById("chk-clara").checked;
            document.getElementById("in-clara").style.display = chk ? "block" : "none";
            renderDocument();
        }

        function formatWeight(w) { 
            if(!w) return ""; 
            w = w.trim().replace(",", ".");
            return isNaN(w) ? w : parseFloat(w).toFixed(3) + " kg";
        }

        function berechneVolumen(dimString) { 
            let match = dimString.match(/(\d+)\s*x\s*(\d+)\s*x\s*(\d+)/i); 
            if(match) return (parseFloat(match[1]) * parseFloat(match[2]) * parseFloat(match[3])) / 1000000; 
            return 0; 
        }

        function addMain() {
            const id = document.getElementById("main-id").value;
            if(!id) return alert("Package ID fehlt!");
            mainPackages.push({
                id: id, typ: document.getElementById("main-typ").value,
                dim: document.getElementById("main-dim").value, temp: document.getElementById("main-temp").value,
                net: formatWeight(document.getElementById("main-net").value), 
                gross: formatWeight(document.getElementById("main-gross").value),
                articles: []
            });
            renderDocument();
            document.getElementById("main-id").value = "";
        }

        function addArticle() {
            if(mainPackages.length === 0) return alert("Zuerst Hauptverpackung anlegen!");
            let lastMain = mainPackages[mainPackages.length - 1];
            lastMain.articles.push({
                inhalt: document.getElementById("art-inhalt").value,
                hs: document.getElementById("art-hs").value,
                qty: document.getElementById("art-qty").value,
                net: formatWeight(document.getElementById("art-net").value),
                gross: formatWeight(document.getElementById("art-gross").value),
                gefahr: document.getElementById("art-gefahr").value
            });
            renderDocument();
            document.getElementById("art-inhalt").value = "";
        }

        function addLogger() {
            loggerData.push({
                pid: document.getElementById("log-pid").value,
                nr: document.getElementById("log-nr").value,
                sn: document.getElementById("log-sn").value,
                info: document.getElementById("log-info").value
            });
            renderDocument();
        }

        function buildEmptyPage(pageNum, isFirstPage) {
            let addressHtml = isFirstPage ? `
                <div class="address-container">
                    <div class="address-box"><div class="address-title">Invoice recipient</div><span class="out-inv-adresse"></span><div class="address-grid"><div>Contact:</div><div class="out-inv-kontakt"></div><div>Phone:</div><div class="out-inv-tel"></div><div>E-Mail:</div><div class="out-inv-mail"></div></div></div>
                    <div class="address-box"><div class="address-title">Consignee</div><span class="out-cons-adresse"></span><div class="address-grid"><div>Contact:</div><div class="out-cons-kontakt"></div><div>Phone:</div><div class="out-cons-tel"></div><div>E-Mail:</div><div class="out-cons-mail"></div></div></div>
                </div>
                <div class="datum">Date: <span class="out-datum"></span></div>
                <div class="section-title">Total packing-list:</div>
                <table class="data-table">
                    <thead><tr><th style="width: 25%">Shipping marks</th><th style="width: 20%">UCR No. (GSIN)</th><th style="width: 10%">Total packages</th><th style="width: 11.7%">Total gross</th><th style="width: 14.4%">Total net</th><th style="width: 15.3%">Total volume</th><th style="width: 14%">Loggers</th></tr></thead>
                    <tbody><tr><td>Address of consignee, <span class="out-fracht-table"></span></td><td>(402) 7640135 790167438 4</td><td class="out-total-packages"></td><td class="out-total-gross"></td><td class="out-total-net"></td><td class="out-total-vol"></td><td class="out-total-logger"></td></tr></tbody>
                </table>` : '';

            return `
            <div class="a4-page" id="page-${pageNum}">
                <div class="vertical-text">7840135792109TEC0165147V4</div>
                <div class="header">
                    <div class="title-block"><h1>Packing List to Freight Unit <span class="out-fracht"></span></h1><span style="font-size: 8pt;">(Version Black Week)</span></div>
                    <div class="barcode-block"><svg class="barcode-svg"></svg></div>
                    <div class="logo-block"><img src="https://upload.wikimedia.org/wikipedia/commons/f/f5/Roche_Logo.svg" alt="Logo"></div>
                </div>
                ${addressHtml}
                <div class="section-title">Detail packing-list:</div>
                <table class="data-table">
                    <thead><tr><th class="col-1">Package ID</th><th class="col-2">Type</th><th class="col-3">Dimensions</th><th class="col-4">Content</th><th class="col-5">Temperature</th><th class="col-6">Devices *</th><th class="col-7">Dangerous</th><th class="col-8">Net weight</th><th class="col-9">Gross weight</th></tr></thead>
                    <tbody class="details-body"></tbody>
                </table>
                <div class="bottom-info-container"></div>
                <div class="footer-fixed">
                    <div><b>F. Hoffmann-La Roche Ltd</b><br>Site Logistics, 4070 Basel</div>
                    <div>Bldg. 041 / 3.005</div>
                    <div>E-Mail: basel.site-logistics@roche.com</div>
                    <div style="text-align: right;">Page ${pageNum} / {TOTAL_PAGES}</div>
                </div>
            </div>`;
        }

        function renderDocument() {
            const container = document.getElementById("pdf-output-container");
            container.innerHTML = ""; pageNum = 1;
            container.insertAdjacentHTML('beforeend', buildEmptyPage(pageNum, true));
            
            let currentPage = document.getElementById(`page-${pageNum}`);
            let currentTbody = currentPage.querySelector(".details-body");
            let sumNet = 0, sumGross = 0, sumVol = 0;

            mainPackages.forEach(main => {
                sumNet += parseFloat(main.net) || 0; sumGross += parseFloat(main.gross) || 0; sumVol += berechneVolumen(main.dim);
                let logStr = loggerData.filter(l => l.pid === main.id).map(l => `${l.nr} ${l.sn}`).join('<br>');
                
                // Hauptzeile
                let mainRow = `<tr><td>${main.id}</td><td>${main.typ}</td><td>${main.dim}</td><td>${main.articles.length > 0 ? main.articles.length + ' Items' : 'Empty'}</td><td>${main.temp}</td><td>${logStr}</td><td></td><td>${main.net}</td><td>${main.gross}</td></tr>`;
                addNodesSafe(mainRow);

                // Artikelzeilen
                if(main.articles.length > 0) {
                    addNodesSafe(`<tr class="sub-header"><th colspan="3">Article Detail</th><th>Content / Batch</th><th colspan="2">HS-Code / Qty</th><th>Gefahr</th><th>Net</th><th>Gross</th></tr>`);
                    main.articles.forEach(art => {
                        let rows = `<tr class="inner-row-1"><td colspan="3" style="border-right:none"></td><td style="border-left:none">${art.inhalt.split('\n')[0]}</td><td colspan="2">${art.hs}</td><td>${art.gefahr}</td><td>${art.net}</td><td>${art.gross}</td></tr>`;
                        let rows2 = `<tr class="inner-row-2"><td colspan="3"></td><td>${art.inhalt.split('\n').slice(1).join('<br>')}</td><td colspan="2">Qty: ${art.qty}</td><td></td><td></td><td></td></tr>`;
                        addNodesSafe(rows); addNodesSafe(rows2);
                    });
                }
            });

            function addNodesSafe(html) {
                currentTbody.insertAdjacentHTML('beforeend', html);
                if (currentPage.scrollHeight > currentPage.clientHeight) {
                    currentTbody.lastElementChild.remove();
                    pageNum++;
                    container.insertAdjacentHTML('beforeend', buildEmptyPage(pageNum, false));
                    currentPage = document.getElementById(`page-${pageNum}`);
                    currentTbody = currentPage.querySelector(".details-body");
                    currentTbody.insertAdjacentHTML('beforeend', html);
                }
            }

            updateGlobalTexts(pageNum, sumNet, sumGross, sumVol);
        }

        function updateGlobalTexts(total, net, gross, vol) {
            const fracht = document.getElementById("in-fracht").value;
            const datum = document.getElementById("in-datum").value;
            
            document.querySelectorAll(".a4-page").forEach((page, idx) => {
                page.innerHTML = page.innerHTML.replace(/{TOTAL_PAGES}/g, total);
                page.querySelectorAll(".out-fracht").forEach(el => el.innerText = fracht);
                page.querySelectorAll(".out-datum").forEach(el => el.innerText = datum);
                
                // Barcode
                let svg = page.querySelector(".barcode-svg");
                if(fracht) JsBarcode(svg, fracht, { format: "CODE128", width: 1.4, height: 28, displayValue: false });

                // Adresse & Totals (nur Seite 1)
                if(idx === 0) {
                    page.querySelector(".out-inv-adresse").innerText = document.getElementById("in-inv-adresse").value;
                    page.querySelector(".out-cons-adresse").innerText = document.getElementById("in-cons-adresse").value;
                    page.querySelector(".out-total-packages").innerText = mainPackages.length;
                    page.querySelector(".out-total-net").innerText = net.toFixed(3) + " kg";
                    page.querySelector(".out-total-gross").innerText = gross.toFixed(3) + " kg";
                    page.querySelector(".out-total-vol").innerText = vol.toFixed(2) + " m3";
                    page.querySelector(".out-total-logger").innerText = loggerData.length;
                }
            });
        }

        function updateLive() { renderDocument(); }
    </script>
</body>
</html>
